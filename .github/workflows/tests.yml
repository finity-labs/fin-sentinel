name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: PHP ${{ matrix.php }} / Filament ${{ matrix.filament }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.2'
            filament: '^4.0'
          - php: '8.3'
            filament: '^4.0'
          - php: '8.2'
            filament: '^5.0'
          - php: '8.3'
            filament: '^5.0'
          - php: '8.4'
            filament: '^5.0'
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install Filament ${{ matrix.filament }}
        run: |
          composer require "filament/filament:${{ matrix.filament }}" --no-interaction --no-update
          composer update --no-interaction --prefer-dist

      - name: Run tests
        run: vendor/bin/pest
