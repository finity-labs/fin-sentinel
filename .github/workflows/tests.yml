name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }} / Filament ${{ matrix.filament }}${{ matrix.with-sdk == 'true' && ' / +sdk' || '' }}${{ matrix.network == 'blocked' && ' / no-net' || '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.2'
            laravel: '^11.0'
            filament: '^4.0'
            with-sdk: 'false'
          - php: '8.3'
            laravel: '^12.0'
            filament: '^5.0'
            with-sdk: 'false'
          - php: '8.3'
            laravel: '^12.0'
            filament: '^5.0'
            with-sdk: 'true'
          - php: '8.4'
            laravel: '^13.0'
            filament: '^5.0'
            with-sdk: 'true'
          - php: '8.3'
            laravel: '^12.0'
            filament: '^5.0'
            with-sdk: 'true'
            network: 'blocked'
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Constrain Laravel + Filament versions
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "filament/filament:${{ matrix.filament }}" --no-interaction --no-update
          composer update --no-interaction --prefer-dist

      - name: Install laravel/ai
        if: matrix.with-sdk == 'true'
        run: composer require "laravel/ai:^0.6" --no-interaction

      - name: Block outbound network
        if: matrix.network == 'blocked'
        uses: step-security/harden-runner@v2
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443

      - name: Run tests
        run: vendor/bin/pest
