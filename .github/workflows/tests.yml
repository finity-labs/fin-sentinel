name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: PHP ${{ matrix.php }}${{ matrix.laravel && format(' / Laravel {0}', matrix.laravel) || '' }} / Filament ${{ matrix.filament }}${{ matrix.with-sdk == 'true' && ' / +sdk' || '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.2'
            filament: '^4.0'
            with-sdk: 'false'
          - php: '8.3'
            laravel: '^12.0'
            filament: '^5.0'
            with-sdk: 'false'
          - php: '8.3'
            laravel: '^12.0'
            filament: '^5.0'
            with-sdk: 'true'
          - php: '8.4'
            laravel: '^13.0'
            filament: '^5.0'
            with-sdk: 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Constrain Laravel + Filament versions
        run: |
          composer require "filament/filament:${{ matrix.filament }}" --no-interaction --no-update
          if [ -n "${{ matrix.laravel }}" ]; then
            composer require "illuminate/contracts:${{ matrix.laravel }}" --no-interaction --no-update
          fi
          if [ "${{ matrix.laravel }}" = "^13.0" ]; then
            composer remove pestphp/pest-plugin-laravel --dev --no-interaction --no-update
          fi
          composer update --no-interaction --prefer-dist

      - name: Install laravel/ai
        if: matrix.with-sdk == 'true'
        run: composer require "laravel/ai:^0.6" --no-interaction

      - name: Run tests
        run: vendor/bin/pest

  tests-network-blocked:
    name: PHP 8.3 / Laravel ^12.0 / Filament ^5.0 / +sdk / no-net
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Constrain Laravel + Filament versions
        run: |
          composer require "laravel/framework:^12.0" "filament/filament:^5.0" --no-interaction --no-update
          composer update --no-interaction --prefer-dist

      - name: Install laravel/ai
        run: composer require "laravel/ai:^0.6" --no-interaction

      - name: Block new outbound connections (keeps runner heartbeat alive)
        run: |
          # The runner agent maintains a long-lived connection to GitHub's
          # control plane. Allowing ESTABLISHED/RELATED keeps that connection
          # flowing while rejecting any NEW outbound connection — which is
          # exactly what an unmocked HTTP call from a test would be. A blanket
          # OUTPUT REJECT (the previous approach) killed the runner mid-job.
          sudo iptables -A OUTPUT -m state --state ESTABLISHED,RELATED -j ACCEPT
          sudo iptables -A OUTPUT -o lo -j ACCEPT
          sudo iptables -A OUTPUT -j REJECT
          sudo ip6tables -A OUTPUT -m state --state ESTABLISHED,RELATED -j ACCEPT
          sudo ip6tables -A OUTPUT -o lo -j ACCEPT
          sudo ip6tables -A OUTPUT -j REJECT

      - name: Run tests
        run: vendor/bin/pest
